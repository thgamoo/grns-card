<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>갈래누리 레벨 그래프</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260517-pages1" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">level design graph</p>
        <h1>레벨 그래프</h1>
      </div>
      <nav class="top-nav" aria-label="주요 페이지">
        <a href="./index.html">상단</a>
        <a href="./card-db.html">카드 DB</a>
        <a href="./field-board.html">필드 판</a>
        <a href="./world.html">세계관</a>
      </nav>
      <div class="header-actions">
        <a class="doc-link" href="./docs/card-design.html">설계 문서</a>
        <button class="doc-link" id="exportImageButton" type="button">PNG Export</button>
      </div>
    </header>

    <main>
      <section class="level-graph-section" id="level-graph" aria-label="레벨디자인 그래프">
        <div class="level-graph-head">
          <div>
            <p class="eyebrow">card balance</p>
            <h2>카드 노드 그래프</h2>
          </div>
          <span id="dbStatus">불러오는 중</span>
        </div>
        <div class="graph-filter-bar" aria-label="그래프 필터">
          <label>
            DB 버전
            <select id="versionSelect"></select>
          </label>
          <label>
            클래스
            <select id="graphClassFilter"></select>
          </label>
          <label>
            카드 타입
            <select id="graphTypeFilter"></select>
          </label>
          <label>
            태그
            <select id="graphTagFilter"></select>
          </label>
        </div>
        <div class="level-graph-layout">
          <div class="graph-panel">
            <svg id="levelGraph" class="level-graph" viewBox="0 0 960 540" role="img" aria-label="카드 비용과 힘을 기준으로 한 노드 그래프"></svg>
          </div>
          <aside class="graph-side">
            <div class="graph-metrics" id="graphMetrics"></div>
            <div class="graph-legend" id="graphLegend"></div>
          </aside>
        </div>
      </section>
    </main>

    <dialog id="cardDialog">
      <button class="dialog-close" id="dialogClose" aria-label="닫기">×</button>
      <div id="dialogBody"></div>
    </dialog>
    <div class="print-area" id="printArea" aria-hidden="true"></div>
    <script src="./app.js?v=20260517-pages1"></script>
  </body>
</html>
