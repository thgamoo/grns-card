<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>괴력난신 카드 DB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260517-pages1" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">card database</p>
        <h1>카드 DB</h1>
      </div>
      <nav class="top-nav" aria-label="주요 페이지">
        <a href="./index.html">상단</a>
        <a href="./graph.html">레벨 그래프</a>
        <a href="./decks.html">스트럭쳐 덱</a>
        <a href="./field-board.html">필드 판</a>
        <a href="./world.html">세계관</a>
      </nav>
      <div class="header-actions">
        <a class="doc-link" href="./docs/index.html">문서</a>
        <a class="doc-link" href="./docs/rulebook.html">룰북</a>
        <button class="doc-link" id="exportImageButton" type="button">PNG Export</button>
        <button class="doc-link" id="printButton" type="button">A4 9장 Print</button>
      </div>
    </header>

    <main>
      <section class="workspace" id="card-db" aria-label="카드 데이터베이스">
        <aside class="filters">
          <div class="filter-group">
            <label for="versionSelect">DB 버전</label>
            <select id="versionSelect"></select>
            <span class="db-status" id="dbStatus">불러오는 중</span>
          </div>
          <div class="filter-group">
            <label for="search">검색</label>
            <input id="search" type="search" placeholder="카드명, 효과, 종족" />
          </div>
          <div class="filter-group">
            <span>클래스</span>
            <div class="segmented" id="classFilters"></div>
          </div>
          <div class="filter-group">
            <span>카드 타입</span>
            <div class="segmented compact" id="typeFilters"></div>
          </div>
          <div class="filter-group">
            <span>태그</span>
            <div class="segmented tags" id="tagFilters"></div>
          </div>
        </aside>

        <section class="library">
          <div class="library-head">
            <div>
              <p class="eyebrow">card database</p>
              <h2>카드 DB</h2>
            </div>
            <span id="resultCount">0장</span>
          </div>
          <div class="card-grid" id="cardGrid"></div>
        </section>
      </section>
    </main>

    <dialog id="cardDialog">
      <button class="dialog-close" id="dialogClose" aria-label="닫기">×</button>
      <div id="dialogBody"></div>
    </dialog>
    <div class="print-area" id="printArea" aria-hidden="true"></div>
    <script src="./app.js?v=20260517-pages1"></script>
  </body>
</html>
