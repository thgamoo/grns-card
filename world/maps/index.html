<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>괴력난신 지도</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #17120d;
        color: #f6efe4;
        font-family: "Noto Sans KR", system-ui, sans-serif;
      }

      .map-page {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .map-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 1rem;
      }

      .map-title {
        margin: 0;
        font-family: "Gowun Batang", serif;
        font-size: clamp(1.35rem, 3vw, 2.35rem);
        line-height: 1;
      }

      .map-toolbar a {
        border: 1px solid rgba(246, 239, 228, 0.58);
        border-radius: 999px;
        background: rgba(246, 239, 228, 0.12);
        color: #f6efe4;
        padding: 0.65rem 0.9rem;
        font-weight: 800;
        text-decoration: none;
      }

      .map-frame {
        display: grid;
        place-items: center;
        min-height: 0;
        padding: 0 1rem 1rem;
      }

      .map-image {
        display: block;
        width: min(100%, 1600px);
        max-height: calc(100vh - 5.5rem);
        object-fit: contain;
        border: 1px solid rgba(246, 239, 228, 0.2);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body>
    <main class="map-page" aria-label="괴력난신 지도">
      <div class="map-toolbar">
        <h1 class="map-title">괴력난신 지도</h1>
        <a href="../../world.html">세계서</a>
      </div>
      <div class="map-frame">
        <img
          class="map-image"
          src="./map-2026-05-24.svg"
          alt="괴력난신 세계 지도"
        />
      </div>
    </main>
  </body>
</html>
